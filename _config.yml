# =============================================================================
# Jekyll configuration for GitHub Pages
# Theme: just-the-docs (via remote_theme)
# =============================================================================

# Site metadata
title: "CARTA image viewer Tutorial"
description: >-
  This is a basic tutorial on the CARTA image viewer [https://cartavis.org/] for the Italian community and users of the Italian ARC node. 
baseurl: "/CARTA_tutorial-ITARC"
url: "https://marcellamassardi.github.io"

# Theme
remote_theme: just-the-docs/just-the-docs@v0.10.1

# Plugins (these are all supported by GitHub Pages)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# just-the-docs configuration
# See: https://just-the-docs.com/docs/configuration/

color_scheme: light

# Enable search
search_enabled: true
search.heading_level: 3

# Aux links (top-right corner of the page)
aux_links:
  "CARTA image viewer":
    - "https://cartavis.org"

aux_links_new_tab: true

# Footer content
footer_content: >-
  Italian ARC &mdash; Tutorial for the Italian community

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Callouts (admonitions) configuration
callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red
  caution:
    title: Caution
    color: red
  info:
    title: Info
    color: blue
  new:
    title: New 
    color: purple

# MathJax site-wide variable
math: mathjax
    
# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - readme.md
  - "*.pdf"
  - .gitignore
